<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TA-PARFUME - Toko Parfum Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            background-attachment: fixed;
            padding-bottom: 70px;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.05) 1px, transparent 1px),
                              radial-gradient(circle at 80% 30%, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .dashboard-header {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .dashboard-header h1 {
            margin: 0;
            font-size: 24px;
            color: #fff;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .dashboard-header h1 i {
            margin-right: 10px;
            color: #ff6b6b;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 1000;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .nav-item-bottom {
            flex: 1;
            text-align: center;
            padding: 8px 5px;
            color: rgba(255,255,255,0.6);
            font-size: 11px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .nav-item-bottom i {
            font-size: 20px;
            display: block;
            margin-bottom: 4px;
        }

        .nav-item-bottom:hover, .nav-item-bottom.active {
            color: #ff6b6b;
            background: rgba(255,255,255,0.1);
        }

        .content-area {
            padding: 15px;
            min-height: calc(100vh - 70px);
            margin-bottom: 60px;
            position: relative;
            z-index: 1;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            background: white;
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            color: white;
            padding: 15px 20px;
            border-radius: 20px 20px 0 0;
        }

        .card-header h4 {
            margin: 0;
            font-size: 18px;
        }

        .card-header h4 i {
            margin-right: 8px;
            color: #ff6b6b;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ff6b6b, #ff8e53, #ff6b6b);
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .product-image-container {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 15px;
            background: #f8f9fa;
        }

        .product-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .product-image-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
        }

        .product-name {
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            margin: 10px 0;
            color: #2c3e50;
        }

        .size-select {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 13px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            margin-bottom: 12px;
            border-top: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
        }

        .price-tag {
            font-size: 18px;
            font-weight: bold;
            color: #ff6b6b;
        }

        .stock-info {
            font-size: 12px;
            background: #f8f9fa;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .stock-available { color: #28a745; }
        .stock-empty { color: #dc3545; }

        .btn-add-cart {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            width: 100%;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .btn-add-cart:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,107,107,0.4);
        }

        .social-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .social-card {
            text-align: center;
            padding: 12px;
            border-radius: 15px;
            cursor: pointer;
            min-width: 80px;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .social-card:hover {
            transform: translateY(-5px);
        }

        .social-icon-wrapper {
            width: 55px;
            height: 55px;
            margin: 0 auto 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 28px;
        }

        .whatsapp { background: linear-gradient(135deg, #25D366, #128C7E); }
        .line { background: linear-gradient(135deg, #00B900, #009900); }
        .telegram { background: linear-gradient(135deg, #0088cc, #006699); }
        .instagram { background: linear-gradient(135deg, #f09433, #bc1888); }
        .facebook { background: linear-gradient(135deg, #1877f2, #0e5a9e); }
        .tiktok { background: linear-gradient(135deg, #000000, #69C9D0, #EE1D52); }
        .social-icon-wrapper i { color: white; }

        .bank-card {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 12px;
            margin: 8px 0;
            cursor: pointer;
            background: white;
            position: relative;
            transition: all 0.3s;
        }

        .bank-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
        }

        .bank-card:hover {
            background: #f8f9fa;
            transform: translateY(-2px);
        }

        .bank-icon { font-size: 24px; color: #ff6b6b; margin-right: 12px; }
        .copy-icon { cursor: pointer; color: #ff6b6b; margin-left: 8px; font-size: 12px; }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
            background: white;
            border-radius: 15px;
        }

        .update-notification {
            position: fixed;
            top: 70px;
            right: 10px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
            z-index: 2000;
            animation: slideIn 0.5s ease-out;
            font-size: 12px;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            border: none;
            border-radius: 10px;
            padding: 10px;
            font-weight: 600;
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,107,107,0.4); }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .product-name { font-size: 13px; }
            .price-tag { font-size: 14px; }
        }

        .table-responsive { overflow-x: auto; }
        .table { background: white; border-radius: 10px; font-size: 12px; }
        .table thead th { background: linear-gradient(135deg, #2c3e50, #1a1a2e); color: white; padding: 10px; }
        .swal2-container { z-index: 2000 !important; }
        .product-image-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="dashboard-header">
        <h1><i class="fas fa-perfume"></i> TA-PARFUME</h1>
    </div>
    
    <div class="content-area" id="contentArea"></div>
    
    <div class="bottom-nav">
        <div class="nav-item-bottom" onclick="showContent('profil')"><i class="fas fa-user"></i><span>Profil</span></div>
        <div class="nav-item-bottom" onclick="showContent('produk')"><i class="fas fa-box"></i><span>Produk</span></div>
        <div class="nav-item-bottom" onclick="showContent('keranjang')"><i class="fas fa-shopping-cart"></i><span>Keranjang</span></div>
        <div class="nav-item-bottom" onclick="showContent('pesanan')"><i class="fas fa-clipboard-list"></i><span>Pesanan</span></div>
        <div class="nav-item-bottom" onclick="showContent('kontak')"><i class="fas fa-phone"></i><span>Kontak</span></div>
        <div class="nav-item-bottom" onclick="showContent('admin')"><i class="fas fa-cog"></i><span>Admin</span></div>
    </div>

    <script>
        let currentUser = null;
        let users = JSON.parse(localStorage.getItem('users')) || [];
        let products = JSON.parse(localStorage.getItem('products')) || [];
        let carts = JSON.parse(localStorage.getItem('carts')) || {};
        let orders = JSON.parse(localStorage.getItem('orders')) || {};
        let contacts = JSON.parse(localStorage.getItem('contacts')) || {
            social: { whatsapp: '', line: '', telegram: '', instagram: '', facebook: '', tiktok: '' },
            banks: []
        };
        
        let currentMenu = 'produk';
        const defaultSizes = ['30ml', '35ml', '50ml', '100ml'];
        const defaultPrices = { '30ml': 300, '35ml': 350, '50ml': 500, '100ml': 900 };

        if (products.length === 0) {
            products = [
                { id: 1, name: 'VICTORIA\'S SECRET SCANDALOUS', image: null, sizes: [{ size: '30ml', price: 300, stock: 5 }, { size: '35ml', price: 350, stock: 4 }, { size: '50ml', price: 500, stock: 3 }, { size: '100ml', price: 900, stock: 2 }] },
                { id: 2, name: 'DIOR SAUVAGE', image: null, sizes: [{ size: '30ml', price: 300, stock: 5 }, { size: '35ml', price: 350, stock: 4 }, { size: '50ml', price: 500, stock: 3 }, { size: '100ml', price: 900, stock: 2 }] },
                { id: 3, name: 'HUGO BOSS XX WOMEN', image: null, sizes: [{ size: '30ml', price: 300, stock: 5 }, { size: '35ml', price: 350, stock: 4 }, { size: '50ml', price: 500, stock: 3 }, { size: '100ml', price: 900, stock: 2 }] }
            ];
            localStorage.setItem('products', JSON.stringify(products));
        }

        const adminUser = { username: 'admin', password: 'admin123', role: 'admin', profile: { name: 'Admin Toko', lineId: '', whatsapp: '', address: '' } };
        if (!users.find(u => u.username === 'admin')) {
            users.push(adminUser);
            localStorage.setItem('users', JSON.stringify(users));
        }

        function showContent(menu) {
            if (!currentUser) { showLogin(); return; }
            currentMenu = menu;
            document.querySelectorAll('.nav-item-bottom').forEach(item => item.classList.remove('active'));
            event.target.closest('.nav-item-bottom').classList.add('active');
            
            switch(menu) {
                case 'profil': showProfile(); break;
                case 'produk': showProducts(); break;
                case 'keranjang': showCart(); break;
                case 'pesanan': showOrders(); break;
                case 'kontak': showContacts(); break;
                case 'admin':
                    if (currentUser.role === 'admin') showAdminPanel();
                    else Swal.fire('Error', 'Hanya admin yang dapat mengakses menu ini!', 'error');
                    break;
            }
        }

        function showLogin() {
            document.getElementById('contentArea').innerHTML = `
                <div class="row justify-content-center">
                    <div class="col-md-5 col-10">
                        <div class="card">
                            <div class="card-header"><h4><i class="fas fa-sign-in-alt"></i> Login / Register</h4></div>
                            <div class="card-body">
                                <form id="loginForm">
                                    <div class="mb-2"><label>Username</label><input type="text" class="form-control" id="loginUsername" required></div>
                                    <div class="mb-2"><label>Password</label><input type="password" class="form-control" id="loginPassword" required></div>
                                    <button type="submit" class="btn btn-primary w-100 mb-2">Login</button>
                                    <button type="button" class="btn btn-secondary w-100" onclick="showRegister()">Register</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('loginForm').onsubmit = (e) => {
                e.preventDefault();
                const user = users.find(u => u.username === document.getElementById('loginUsername').value && u.password === document.getElementById('loginPassword').value);
                if (user) {
                    currentUser = user;
                    Swal.fire({ title: 'Success!', text: 'Login berhasil!', icon: 'success', timer: 1500, showConfirmButton: false });
                    setTimeout(() => showProducts(), 1500);
                } else {
                    Swal.fire('Error', 'Username atau password salah!', 'error');
                }
            };
        }

        function showRegister() {
            document.getElementById('contentArea').innerHTML = `
                <div class="row justify-content-center">
                    <div class="col-md-5 col-10">
                        <div class="card">
                            <div class="card-header"><h4><i class="fas fa-user-plus"></i> Register</h4></div>
                            <div class="card-body">
                                <form id="registerForm">
                                    <div class="mb-2"><label>Username</label><input type="text" class="form-control" id="regUsername" required></div>
                                    <div class="mb-2"><label>Password</label><input type="password" class="form-control" id="regPassword" required></div>
                                    <div class="mb-2"><label>Nama Lengkap</label><input type="text" class="form-control" id="regName" required></div>
                                    <button type="submit" class="btn btn-primary w-100 mb-2">Register</button>
                                    <button type="button" class="btn btn-secondary w-100" onclick="showLogin()">Kembali</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('registerForm').onsubmit = (e) => {
                e.preventDefault();
                const username = document.getElementById('regUsername').value;
                if (users.find(u => u.username === username)) {
                    Swal.fire('Error', 'Username sudah terdaftar!', 'error');
                    return;
                }
                users.push({ username, password: document.getElementById('regPassword').value, role: 'user', profile: { name: document.getElementById('regName').value, lineId: '', whatsapp: '', address: '' } });
                localStorage.setItem('users', JSON.stringify(users));
                Swal.fire('Success', 'Registrasi berhasil! Silakan login.', 'success');
                showLogin();
            };
        }

        function showProfile() {
            const profile = currentUser.profile;
            document.getElementById('contentArea').innerHTML = `
                <div class="card">
                    <div class="card-header"><h4><i class="fas fa-id-card"></i> Profil Pelanggan</h4></div>
                    <div class="card-body">
                        <form id="profileForm">
                            <div class="mb-2"><label>Username</label><input type="text" class="form-control" value="${currentUser.username}" disabled></div>
                            <div class="mb-2"><label>Nama Lengkap</label><input type="text" class="form-control" id="profileName" value="${profile.name || ''}" required></div>
                            <div class="mb-2"><label>ID Line</label><input type="text" class="form-control" id="profileLineId" value="${profile.lineId || ''}"></div>
                            <div class="mb-2"><label>No WhatsApp</label><input type="text" class="form-control" id="profileWhatsapp" value="${profile.whatsapp || ''}" required></div>
                            <div class="mb-2"><label>Alamat</label><textarea class="form-control" id="profileAddress" rows="2" required>${profile.address || ''}</textarea></div>
                            <button type="submit" class="btn btn-primary w-100 mb-2">Simpan Profil</button>
                            <button type="button" class="btn btn-warning w-100 mb-2" onclick="changePassword()">Ganti Password</button>
                            <button type="button" class="btn btn-danger w-100" onclick="logout()">Keluar</button>
                        </form>
                    </div>
                </div>
            `;
            document.getElementById('profileForm').onsubmit = (e) => {
                e.preventDefault();
                currentUser.profile = {
                    name: document.getElementById('profileName').value,
                    lineId: document.getElementById('profileLineId').value,
                    whatsapp: document.getElementById('profileWhatsapp').value,
                    address: document.getElementById('profileAddress').value
                };
                const idx = users.findIndex(u => u.username === currentUser.username);
                users[idx] = currentUser;
                localStorage.setItem('users', JSON.stringify(users));
                Swal.fire('Success', 'Profil berhasil diupdate!', 'success');
            };
        }

        function changePassword() {
            Swal.fire({
                title: 'Ganti Password',
                html: `<input type="password" id="oldPass" class="swal2-input" placeholder="Password Lama"><input type="password" id="newPass" class="swal2-input" placeholder="Password Baru"><input type="password" id="confirmPass" class="swal2-input" placeholder="Konfirmasi">`,
                showCancelButton: true, confirmButtonText: 'Ganti',
                preConfirm: () => {
                    if (document.getElementById('oldPass').value !== currentUser.password) return Swal.showValidationMessage('Password lama salah!');
                    if (document.getElementById('newPass').value !== document.getElementById('confirmPass').value) return Swal.showValidationMessage('Password baru tidak cocok!');
                    if (document.getElementById('newPass').value.length < 3) return Swal.showValidationMessage('Minimal 3 karakter!');
                    currentUser.password = document.getElementById('newPass').value;
                    const idx = users.findIndex(u => u.username === currentUser.username);
                    users[idx] = currentUser;
                    localStorage.setItem('users', JSON.stringify(users));
                    Swal.fire('Success', 'Password berhasil diganti!', 'success');
                }
            });
        }

        function logout() { currentUser = null; Swal.fire('Logout', 'Anda telah keluar!', 'success'); showLogin(); }

        function showProducts() {
            products = JSON.parse(localStorage.getItem('products')) || [];
            let html = `<div class="products-grid">`;
            if (products.length === 0) {
                html += `<div class="empty-message" style="grid-column:1/-1;"><i class="fas fa-box-open fa-3x mb-3"></i><p>Belum ada produk</p></div>`;
            } else {
                products.forEach(p => {
                    const defSize = p.sizes.find(s => s.size === '30ml') || p.sizes[0];
                    html += `
                        <div class="product-card">
                            <div class="product-image-container">
                                ${p.image ? `<img src="${p.image}" class="product-image">` : `<div class="product-image-placeholder"><i class="fas fa-perfume"></i></div>`}
                            </div>
                            <div class="product-name">${p.name}</div>
                            <select class="size-select" id="size-${p.id}" onchange="updatePrice(${p.id})">
                                ${p.sizes.map(s => `<option value="${s.size}" data-price="${s.price}" data-stock="${s.stock}">${s.size} - ${s.price} Bath</option>`).join('')}
                            </select>
                            <div class="info-row">
                                <div class="price-tag" id="price-${p.id}">${defSize.price} Bath</div>
                                <div class="stock-info stock-available"><i class="fas fa-box"></i> Sisa: ${defSize.stock}</div>
                            </div>
                            <button class="btn-add-cart" onclick="addToCart(${p.id})"><i class="fas fa-shopping-cart"></i> BELI SEKARANG</button>
                        </div>
                    `;
                });
            }
            html += `</div>`;
            document.getElementById('contentArea').innerHTML = html;
        }

        function updatePrice(id) {
            const sel = document.getElementById(`size-${id}`);
            const opt = sel.options[sel.selectedIndex];
            document.getElementById(`price-${id}`).textContent = `${opt.getAttribute('data-price')} Bath`;
        }

        function addToCart(id) {
            const sel = document.getElementById(`size-${id}`);
            const size = sel.value;
            const price = sel.options[sel.selectedIndex].getAttribute('data-price');
            const stock = parseInt(sel.options[sel.selectedIndex].getAttribute('data-stock'));
            if (!size) return Swal.fire('Error', 'Pilih ukuran!', 'error');
            if (stock <= 0) return Swal.fire('Error', 'Stok habis!', 'error');
            if (!carts[currentUser.username]) carts[currentUser.username] = [];
            const existing = carts[currentUser.username].find(i => i.productId === id && i.size === size);
            if (existing) {
                if (existing.quantity + 1 > stock) return Swal.fire('Error', `Stok hanya ${stock}!`, 'error');
                existing.quantity++;
            } else {
                carts[currentUser.username].push({ productId: id, productName: products.find(p => p.id === id).name, size, price: parseInt(price), quantity: 1, maxStock: stock });
            }
            localStorage.setItem('carts', JSON.stringify(carts));
            Swal.fire({ title: 'Berhasil!', text: 'Ditambahkan ke keranjang!', icon: 'success', timer: 1200, showConfirmButton: false });
        }

        function showCart() {
            const cart = carts[currentUser.username] || [];
            if (cart.length === 0) {
                document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-body text-center"><i class="fas fa-shopping-cart fa-3x text-muted mb-3"></i><h5>Keranjang Kosong</h5></div></div>`;
                return;
            }
            let total = 0;
            let html = `<div class="card"><div class="card-header"><h4><i class="fas fa-shopping-cart"></i> Keranjang Belanja</h4></div><div class="card-body"><div class="list-group">`;
            cart.forEach((item, i) => {
                const subtotal = item.price * item.quantity;
                total += subtotal;
                html += `<div class="list-group-item"><div class="row"><div class="col-12"><strong>${item.productName}</strong> (${item.size})</div><div class="col-4">${item.price} Bath</div><div class="col-4"><input type="number" min="1" max="${item.maxStock}" value="${item.quantity}" onchange="updateQty(${i},this.value)" class="form-control form-control-sm"></div><div class="col-2">${subtotal}</div><div class="col-2"><button class="btn btn-danger btn-sm" onclick="removeItem(${i})"><i class="fas fa-trash"></i></button></div></div></div>`;
            });
            html += `</div><hr><div class="row"><div class="col-6"><h5>Total: ${total} Bath</h5></div><div class="col-6 text-end"><button class="btn btn-success w-100" onclick="checkout()">Checkout</button></div></div></div></div>`;
            document.getElementById('contentArea').innerHTML = html;
        }

        function updateQty(i, qty) { if (qty < 1) qty = 1; const item = carts[currentUser.username][i]; if (qty > item.maxStock) { Swal.fire('Error', `Maksimal ${item.maxStock}!`, 'error'); qty = item.maxStock; } carts[currentUser.username][i].quantity = parseInt(qty); localStorage.setItem('carts', JSON.stringify(carts)); showCart(); }
        function removeItem(i) { carts[currentUser.username].splice(i, 1); localStorage.setItem('carts', JSON.stringify(carts)); showCart(); }

        function checkout() {
            const profile = currentUser.profile;
            if (!profile.name || !profile.whatsapp || !profile.address) { Swal.fire('Error', 'Lengkapi profil dulu!', 'error'); showProfile(); return; }
            const cart = carts[currentUser.username] || [];
            if (cart.length === 0) return Swal.fire('Error', 'Keranjang kosong!', 'error');
            products = JSON.parse(localStorage.getItem('products')) || [];
            let ok = true;
            cart.forEach(item => {
                const p = products.find(pr => pr.id === item.productId);
                const idx = p.sizes.findIndex(s => s.size === item.size);
                if (p.sizes[idx].stock >= item.quantity) p.sizes[idx].stock -= item.quantity;
                else ok = false;
            });
            if (!ok) return Swal.fire('Error', 'Stok tidak mencukupi!', 'error');
            localStorage.setItem('products', JSON.stringify(products));
            if (!orders[currentUser.username]) orders[currentUser.username] = [];
            orders[currentUser.username].push({ orderId: Date.now(), date: new Date().toISOString(), items: [...cart], total: cart.reduce((s,i)=>s+(i.price*i.quantity),0), status: 'pending', profile: {...profile}, username: currentUser.username });
            localStorage.setItem('orders', JSON.stringify(orders));
            carts[currentUser.username] = [];
            localStorage.setItem('carts', JSON.stringify(carts));
            Swal.fire('Success', 'Checkout berhasil!', 'success');
            showOrders();
        }

        function showOrders() {

                html += `<div class="card mb-2"><div class="card-header" style="background:white;border-bottom:1px solid #ff6b6b;"><strong>Order #${o.orderId}</strong><span class="badge bg-${statusColor} float-end">${statusText}</span></div><div class="card-body"><p>${new Date(o.date).toLocaleString()}</p><p>Total: ${o.total} Bath</p><button class="btn btn-primary btn-sm" onclick="detailOrder(${o.orderId})">Detail</button></div></div>`;

        function addProduct() {
            const formId = 'addForm_' + Date.now();

                    <div class="mb-2">
                        <label>${size}</label>

                    <div id="${formId}">

                        <div class="mb-2">
                            <label class="swal2-file-label">Foto Produk</label>

                        <div id="sizeContainer_${formId}">${sizeHtml}</div>
                    </div>
                `,
                width: '550px',
                showCancelButton: true,
                confirmButtonText: 'Simpan',
                cancelButtonText: 'Batal',
                confirmButtonColor: '#ff6b6b',
                didOpen: () => {
                    setTimeout(() => {
                        const fileInput = document.getElementById(`prodImage_${formId}`);
                        if (fileInput) {
                            fileInput.onchange = (e) => {
                                const file = e.target.files[0];
                                if (file) {
                                    if (file.size > 2 * 1024 * 1024) {
                                        Swal.fire('Error', 'File maksimal 2MB!', 'error');
                                        fileInput.value = '';
                                        return;
                                    }
                                    if (!file.type.match('image.*')) {
                                        Swal.fire('Error', 'Hanya file gambar!', 'error');
                                        fileInput.value = '';
                                        return;
                                    }
                                    const reader = new FileReader();
                                    reader.onload = (e) => {
                                        document.getElementById(`imagePreview_${formId}`).innerHTML = `<img src="${e.target.result}" style="max-width:100%;max-height:100px;border-radius:8px;">`;
                                    };
                                    reader.readAsDataURL(file);
                                }
                            };
                        }
                    }, 100);
                },
                preConfirm: () => {
                    return new Promise((resolve) => {
                        const name = document.getElementById(`prodName_${formId}`).value;
                        const fileInput = document.getElementById(`prodImage_${formId}`);
                        if (!name) { Swal.showValidationMessage('Nama produk harus diisi!'); resolve(false); return; }
                        
                        const sizes = [];
                        const priceInputs = document.querySelectorAll(`#${formId} .price-input`);
                        const stockInputs = document.querySelectorAll(`#${formId} .stock-input`);
                        for (let i = 0; i < priceInputs.length; i++) {
                            const size = priceInputs[i].getAttribute('data-size');
                            const price = parseInt(priceInputs[i].value);
                            const stock = parseInt(stockInputs[i].value);
                            if (price && !isNaN(price) && price > 0) {
                                sizes.push({ size, price, stock: stock || 0 });
                            }
                        }
                        if (sizes.length === 0) { Swal.showValidationMessage('Minimal satu ukuran dengan harga valid!'); resolve(false); return; }
                        
                        const newId = Date.now();
                        const newProduct = { id: newId, name: name.trim(), image: null, sizes };
                        
                        if (fileInput && fileInput.files && fileInput.files[0]) {
                            const reader = new FileReader();
                            reader.onload = (e) => {
                                newProduct.image = e.target.result;
                                products.push(newProduct);
                                localStorage.setItem('products', JSON.stringify(products));
                                Swal.fire({ title: 'Berhasil!', text: 'Produk ditambahkan!', icon: 'success', timer: 1500, showConfirmButton: false });
                                loadProductList();
                                window.dispatchEvent(new StorageEvent('storage', { key: 'products', newValue: JSON.stringify(products) }));
                                resolve(true);
                            };
                            reader.onerror = () => { Swal.fire('Error', 'Gagal baca gambar!', 'error'); resolve(false); };
                            reader.readAsDataURL(fileInput.files[0]);
                        } else {
                            products.push(newProduct);
                            localStorage.setItem('products', JSON.stringify(products));
                            Swal.fire({ title: 'Berhasil!', text: 'Produk ditambahkan!', icon: 'success', timer: 1500, showConfirmButton: false });
                            loadProductList();
                            window.dispatchEvent(new StorageEvent('storage', { key: 'products', newValue: JSON.stringify(products) }));
                            resolve(true);
                        }
                    });
                }
            });
        }

        function deleteProduct(id) {

        function updateOrderStat(username, orderId) {
            const sel = document.getElementById(`status-${orderId}`);

            const idx = orders[username].findIndex(o => o.orderId === orderId);
            if (idx !== -1) { orders[username][idx].status = newStatus; localStorage.setItem('orders', JSON.stringify(orders)); Swal.fire('Success', 'Status diupdate!', 'success'); loadOrderList(); }

        function deleteOrder(username, orderId) {
            Swal.fire({ title: 'Hapus pesanan?', icon: 'warning', showCancelButton: true, confirmButtonText: 'Hapus', confirmButtonColor: '#dc3545' }).then(res => {
                if (res.isConfirmed) {
                    const idx = orders[username].findIndex(o => o.orderId === orderId);
                    if (idx !== -1) { orders[username].splice(idx, 1); if (orders[username].length === 0) delete orders[username]; localStorage.setItem('orders', JSON.stringify(orders)); Swal.fire('Deleted!', 'Pesanan dihapus.', 'success'); loadOrderList(); }
                }
            });
        }

        function loadContactForm() {
            contacts = JSON.parse(localStorage.getItem('contacts')) || { social: { whatsapp: '', line: '', telegram: '', instagram: '', facebook: '', tiktok: '' }, banks: [] };
            let bankHtml = '';
            contacts.banks.forEach((b, i) => {
                bankHtml += `<div class="mb-2 p-2 border rounded"><input type="text" placeholder="Nama Bank" value="${b.bankName}" class="form-control mb-1"><input type="text" placeholder="Nama Pemilik" value="${b.name}" class="form-control mb-1"><input type="text" placeholder="No. Rekening" value="${b.number}" class="form-control mb-1"><button type="button" class="btn btn-sm btn-danger" onclick="removeBank(${i})">Hapus</button></div>`;
            });
            document.getElementById('contactForm').innerHTML = `
                <form id="adminContactForm">
                    <h6>Media Sosial</h6>
                    <div class="mb-2"><label>WhatsApp URL</label><input type="url" class="form-control" id="waLink" value="${contacts.social.whatsapp || ''}"></div>
                    <div class="mb-2"><label>Line URL</label><input type="url" class="form-control" id="lineLink" value="${contacts.social.line || ''}"></div>
                    <div class="mb-2"><label>Telegram URL</label><input type="url" class="form-control" id="teleLink" value="${contacts.social.telegram || ''}"></div>
                    <div class="mb-2"><label>Instagram URL</label><input type="url" class="form-control" id="igLink" value="${contacts.social.instagram || ''}"></div>
                    <div class="mb-2"><label>Facebook URL</label><input type="url" class="form-control" id="fbLink" value="${contacts.social.facebook || ''}"></div>
                    <div class="mb-2"><label>TikTok URL</label><input type="url" class="form-control" id="ttLink" value="${contacts.social.tiktok || ''}"></div>
                    <hr><h6>Rekening Bank</h6><div id="bankList">${bankHtml}</div>
                    <button type="button" class="btn btn-sm btn-secondary mb-2" onclick="addBankField()"><i class="fas fa-plus"></i> Tambah Bank</button>
                    <hr><button type="submit" class="btn btn-primary w-100">Simpan</button>
                </form>
            `;
            document.getElementById('adminContactForm').onsubmit = (e) => {
                e.preventDefault();
                const newContacts = {
                    social: { whatsapp: document.getElementById('waLink').value, line: document.getElementById('lineLink').value, telegram: document.getElementById('teleLink').value, instagram: document.getElementById('igLink').value, facebook: document.getElementById('fbLink').value, tiktok: document.getElementById('ttLink').value },
                    banks: []
                };
                document.querySelectorAll('#bankList > div').forEach(div => {
                    const inputs = div.querySelectorAll('input');
                    if (inputs[0] && inputs[0].value && inputs[1] && inputs[1].value && inputs[2] && inputs[2].value) {
                        newContacts.banks.push({ bankName: inputs[0].value, name: inputs[1].value, number: inputs[2].value });
                    }
                });
                contacts = newContacts;
                localStorage.setItem('contacts', JSON.stringify(contacts));
                Swal.fire('Success', 'Kontak diupdate!', 'success');
                window.dispatchEvent(new StorageEvent('storage', { key: 'contacts', newValue: JSON.stringify(contacts) }));
            };
        }

        function addBankField() {
            const div = document.createElement('div');
            div.className = 'mb-2 p-2 border rounded';
            div.innerHTML = `<input type="text" placeholder="Nama Bank" class="form-control mb-1"><input type="text" placeholder="Nama Pemilik" class="form-control mb-1"><input type="text" placeholder="No. Rekening" class="form-control mb-1"><button type="button" class="btn btn-sm btn-danger" onclick="this.parentElement.remove()">Hapus</button>`;
            document.getElementById('bankList').appendChild(div);
        }

        function removeBank(idx) {
            contacts.banks.splice(idx, 1);
            localStorage.setItem('contacts', JSON.stringify(contacts));
            loadContactForm();
        }

        function loadAdminPassForm() {
            document.getElementById('adminPassForm').innerHTML = `
                <form id="adminPassFormSubmit">
                    <div class="mb-2"><label>Password Baru</label><input type="password" class="form-control" id="newAdminPass" required></div>
                    <div class="mb-2"><label>Konfirmasi</label><input type="password" class="form-control" id="confirmAdminPass" required></div>
                    <button type="submit" class="btn btn-primary w-100">Ganti Password</button>
                </form>
            `;
            document.getElementById('adminPassFormSubmit').onsubmit = (e) => {
                e.preventDefault();
                const newPass = document.getElementById('newAdminPass').value;
                const confirm = document.getElementById('confirmAdminPass').value;
                if (newPass !== confirm) return Swal.fire('Error', 'Password tidak cocok!', 'error');
                if (newPass.length < 3) return Swal.fire('Error', 'Minimal 3 karakter!', 'error');
                const idx = users.findIndex(u => u.username === 'admin');
                users[idx].password = newPass;
                localStorage.setItem('users', JSON.stringify(users));
                if (currentUser.username === 'admin') currentUser.password = newPass;
                Swal.fire('Success', 'Password admin diganti!', 'success');
            };
        }

        showLogin();
        setInterval(() => {
            if (currentUser && (currentMenu === 'produk' || currentMenu === 'kontak')) {
                const newProducts = JSON.parse(localStorage.getItem('products')) || [];
                const newContacts = JSON.parse(localStorage.getItem('contacts')) || {};
                if (JSON.stringify(newProducts) !== JSON.stringify(products)) { products = newProducts; if (currentMenu === 'produk') showProducts(); }
                if (JSON.stringify(newContacts) !== JSON.stringify(contacts)) { contacts = newContacts; if (currentMenu === 'kontak') showContacts(); }
            }
        }, 3000);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
