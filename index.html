<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TA-PARFUME - Toko Parfum Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: url('walpa2.avif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding-bottom: 70px;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 249, 10, 0.3);
            pointer-events: none;
            z-index: 0;
        }
        .dashboard-header {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 1000;
            text-align: center;
            border-bottom: 1px solid rgba(255,215,0,0.3);
        }
        .dashboard-header h1 { margin: 0; font-size: 20px; color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .dashboard-header h1 i { margin-right: 8px; color: #FFD700; }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 1000;
            border-top: 1px solid rgba(255,215,0,0.3);
        }
        .nav-item-bottom {
            flex: 1; text-align: center; padding: 6px 3px;
            color: rgba(255,255,255,0.7);
            font-size: 10px; cursor: pointer;
            border-radius: 10px; transition: all 0.3s;
        }
        .nav-item-bottom i { font-size: 18px; display: block; margin-bottom: 3px; }
        .nav-item-bottom:hover, .nav-item-bottom.active { color: #FFD700; background: rgba(255,215,0,0.15); }
        .content-area { padding: 12px; min-height: calc(100vh - 60px); margin-bottom: 60px; position: relative; z-index: 1; }
        .card { border: none; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); margin-bottom: 16px; background: white; overflow: hidden; }
        .card-header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 12px 16px; border-radius: 20px 20px 0 0; }
        .card-header h4 { margin: 0; font-size: 16px; }
        .card-header h4 i { margin-right: 8px; color: #FFD700; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        @media (min-width: 768px) {
            .products-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; }
            .card-header h4 { font-size: 18px; }
            .nav-item-bottom { font-size: 12px; padding: 8px 5px; }
            .nav-item-bottom i { font-size: 22px; }
            .content-area { padding: 20px; max-width: 1400px; margin-left: auto; margin-right: auto; }
        }
        @media (min-width: 1200px) { .products-grid { grid-template-columns: repeat(4, 1fr); } }
        .product-card {
            border-radius: 16px; padding: 14px 12px; transition: all 0.3s ease;
            border: 3px solid #FFD700; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            background: white;
        }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 12px 28px rgba(0,0,0,0.2); border-color: #FFA500; }
        .product-image-container { position: relative; width: 100%; padding-bottom: 100%; overflow: hidden; border-radius: 12px; margin-bottom: 12px; background: #f5f5f5; }
        .product-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .product-image-placeholder { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; color: white; font-size: 36px; }
        .product-name-badge { display: block; text-align: center; background: #FFF; border: 2px solid #FFD700; border-radius: 25px; padding: 8px 10px; margin-bottom: 12px; font-size: 13px; font-weight: 800; color: #000; }
        .size-select-wrapper { margin-bottom: 12px; }
        .size-select { width: 100%; padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 13px; font-weight: 600; background: #fff; cursor: pointer; }
        .size-select:focus { border-color: #FFD700; outline: none; box-shadow: 0 0 0 3px rgba(255,215,0,0.2); }
        .info-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; margin-bottom: 12px; border-top: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; }
        .price-badge { background: #FFF; border: 2px solid #FFD700; border-radius: 20px; padding: 4px 12px; font-size: 14px; font-weight: 800; color: #000; }
        .stock-info { font-size: 11px; background: #FFF; padding: 4px 10px; border-radius: 20px; font-weight: 700; border: 1px solid #ddd; }
        .btn-add-cart { background: linear-gradient(135deg, #FFD700, #FFA500); color: #000000; border: none; padding: 10px; border-radius: 10px; width: 100%; font-weight: 800; font-size: 12px; text-transform: uppercase; transition: all 0.3s; cursor: pointer; }
        .btn-add-cart:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(255,215,0,0.4); }
        .btn-add-cart i { color: #000000; margin-right: 5px; }
        .btn-primary { background: linear-gradient(135deg, #ff6b6b, #ff8e53); border: none; border-radius: 10px; padding: 10px; font-weight: 600; }
        .btn-warning { background: linear-gradient(135deg, #ffc107, #ff9800); border: none; color: white; }
        .btn-danger { background: linear-gradient(135deg, #dc3545, #c82333); border: none; }
        .btn-success { background: linear-gradient(135deg, #28a745, #20c997); border: none; }
        .btn-secondary { background: linear-gradient(135deg, #6c757d, #5a6268); border: none; }
        .empty-message { text-align: center; padding: 40px; color: #666; background: white; border-radius: 15px; }
        .table-responsive { overflow-x: auto; }
        .table { background: white; border-radius: 10px; font-size: 12px; min-width: 600px; }
        .table thead th { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 10px; }
        .product-image-thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 8px; }
        .badge-status { padding: 4px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; }
        .badge-pending { background: #ffc107; color: #000; }
        .badge-processed { background: #17a2b8; color: #fff; }
        .badge-completed { background: #28a745; color: #fff; }
        .admin-only { display: none; }
        .welcome-text { color: #fff; font-size: 12px; margin-top: 5px; opacity: 0.8; }
        .bank-card { border: 1px solid #e0e0e0; border-radius: 12px; padding: 10px; margin: 6px 0; cursor: pointer; background: white; }
        .bank-card:hover { background: #f8f9fa; transform: scale(1.02); }
        .social-container { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin: 15px 0; }
        .social-card { text-align: center; padding: 8px; border-radius: 12px; cursor: pointer; min-width: 70px; background: white; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .social-card:hover { transform: translateY(-3px); }
        .social-icon-wrapper { width: 45px; height: 45px; margin: 0 auto 6px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 22px; }
        .whatsapp { background: #25D366; }
        .line { background: #00B900; }
        .telegram { background: #0088cc; }
        .instagram { background: linear-gradient(135deg, #f09433, #bc1888); }
        .facebook { background: #1877f2; }
        .tiktok { background: #000; }
        .social-icon-wrapper i { color: white; }
        .social-name { font-size: 10px; }
        .file-input-label { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 10px 18px; border-radius: 10px; cursor: pointer; display: inline-block; font-size: 13px; font-weight: 600; }
        .image-preview { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; margin-top: 10px; border: 2px solid #FFD700; }
        .form-group { margin-bottom: 16px; }
        .form-group label { font-weight: 600; margin-bottom: 6px; display: block; font-size: 13px; }
        .size-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; background: #f8f9fa; padding: 10px; border-radius: 10px; }
        .size-name-input { width: 85px; padding: 8px; border: 1px solid #ddd; border-radius: 8px; }
        .size-price-input, .size-stock-input { flex: 1; min-width: 80px; padding: 8px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-remove-size { background: #dc3545; color: white; border: none; border-radius: 8px; padding: 8px 12px; cursor: pointer; }
        .btn-add-size { background: linear-gradient(135deg, #28a745, #20c997); color: white; border: none; padding: 10px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: 12px; width: 100%; }
        .nav-tabs .nav-link { color: #666; font-weight: 600; }
        .nav-tabs .nav-link.active { color: #FFD700; background: linear-gradient(135deg, #1a1a2e, #16213e); border-color: #FFD700; }
        .action-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
    </style>
</head>
<body>
    <div class="dashboard-header">
        <h1><i class="fas fa-perfume"></i> TA-PARFUME</h1>
        <div class="welcome-text" id="welcomeText"></div>
    </div>
    <div class="content-area" id="contentArea"></div>
    <div class="bottom-nav" id="bottomNav">
        <div class="nav-item-bottom" onclick="showContent('profil')"><i class="fas fa-user"></i><span>Profil</span></div>
        <div class="nav-item-bottom" onclick="showContent('produk')"><i class="fas fa-box"></i><span>Produk</span></div>
        <div class="nav-item-bottom" onclick="showContent('keranjang')"><i class="fas fa-shopping-cart"></i><span>Keranjang</span></div>
        <div class="nav-item-bottom" onclick="showContent('pesanan')"><i class="fas fa-clipboard-list"></i><span>Pesanan</span></div>
        <div class="nav-item-bottom" onclick="showContent('kontak')"><i class="fas fa-phone"></i><span>Kontak</span></div>
        <div class="nav-item-bottom admin-only" id="adminNav" onclick="showContent('admin')"><i class="fas fa-cog"></i><span>Admin</span></div>
    </div>

    <script>
        // ==================== DATA STORAGE KEYS ====================
        const STORAGE_KEYS = {
            USERS: 'ta_parfume_users',
            PRODUCTS: 'ta_parfume_products',
            CARTS: 'ta_parfume_carts',
            ORDERS: 'ta_parfume_orders',
            CONTACTS: 'ta_parfume_contacts',
            SESSION: 'ta_parfume_session'
        };
        
        // ==================== DATA GLOBAL ====================
        let currentUser = null;
        
        // Fungsi untuk load semua data
        function getUsers() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '[]'); }
        function getProducts() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.PRODUCTS) || '[]'); }
        function getCarts() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.CARTS) || '{}'); }
        function getOrders() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.ORDERS) || '{}'); }
        function getContacts() { 
            return JSON.parse(localStorage.getItem(STORAGE_KEYS.CONTACTS) || JSON.stringify({
                social: { whatsapp: '', line: '', telegram: '', instagram: '', facebook: '', tiktok: '' },
                banks: []
            }));
        }
        
        function setUsers(data) { localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(data)); }
        function setProducts(data) { localStorage.setItem(STORAGE_KEYS.PRODUCTS, JSON.stringify(data)); }
        function setCarts(data) { localStorage.setItem(STORAGE_KEYS.CARTS, JSON.stringify(data)); }
        function setOrders(data) { localStorage.setItem(STORAGE_KEYS.ORDERS, JSON.stringify(data)); }
        function setContacts(data) { localStorage.setItem(STORAGE_KEYS.CONTACTS, JSON.stringify(data)); }
        
        // Inisialisasi data default
        function initData() {
            let users = getUsers();
            let products = getProducts();
            
            if (products.length === 0) {
                products = [
                    { id: 1, name: 'VICTORIA\'S SECRET SCANDALOUS', image: null, sizes: [{ size: '30ml', price: 300, stock: 5 }, { size: '35ml', price: 350, stock: 4 }, { size: '50ml', price: 500, stock: 3 }, { size: '100ml', price: 900, stock: 2 }] },
                    { id: 2, name: 'DIOR SAUVAGE', image: null, sizes: [{ size: '30ml', price: 300, stock: 5 }, { size: '35ml', price: 350, stock: 4 }, { size: '50ml', price: 500, stock: 3 }, { size: '100ml', price: 900, stock: 2 }] },
                    { id: 3, name: 'HUGO BOSS XX WOMEN', image: null, sizes: [{ size: '30ml', price: 300, stock: 5 }, { size: '35ml', price: 350, stock: 4 }, { size: '50ml', price: 500, stock: 3 }, { size: '100ml', price: 900, stock: 2 }] }
                ];
                setProducts(products);
            }
            
            if (!users.find(u => u.username === 'admin')) {
                users.push({ 
                    username: 'admin', 
                    password: 'admin123', 
                    role: 'admin', 
                    profile: { name: 'Administrator', lineId: '', whatsapp: '08123456789', address: 'Jakarta' } 
                });
                setUsers(users);
            }
        }
        
        // Session helpers
        function saveSession(user) {
            localStorage.setItem(STORAGE_KEYS.SESSION, JSON.stringify({
                username: user.username,
                password: user.password,
                role: user.role,
                profile: user.profile,
                timestamp: Date.now()
            }));
        }
        
        function loadSession() {
            const sessionData = localStorage.getItem(STORAGE_KEYS.SESSION);
            if (sessionData) {
                try {
                    const session = JSON.parse(sessionData);
                    const users = getUsers();
                    const user = users.find(u => u.username === session.username && u.password === session.password);
                    if (user && (Date.now() - (session.timestamp || 0) < 24 * 60 * 60 * 1000)) {
                        return user;
                    }
                } catch(e) {}
                localStorage.removeItem(STORAGE_KEYS.SESSION);
            }
            return null;
        }
        
        function clearSession() { localStorage.removeItem(STORAGE_KEYS.SESSION); }
        
        function updateNavVisibility() {
            const adminNav = document.getElementById('adminNav');
            if (adminNav) {
                adminNav.style.display = (currentUser && currentUser.role === 'admin') ? 'block' : 'none';
            }
        }
        
        let currentMenu = 'produk';
        
        // ==================== NAVIGASI ====================
        function showContent(menu) {
            if (!currentUser) { showLogin(); return; }
            currentMenu = menu;
            
            document.querySelectorAll('.nav-item-bottom').forEach(item => item.classList.remove('active'));
            if(event && event.target) {
                const clicked = event.target.closest('.nav-item-bottom');
                if(clicked) clicked.classList.add('active');
            }
            
            switch(menu) {
                case 'profil': showProfile(); break;
                case 'produk': showProducts(); break;
                case 'keranjang': showCart(); break;
                case 'pesanan': showOrders(); break;
                case 'kontak': showContacts(); break;
                case 'admin':
                    if (currentUser.role === 'admin') showAdminPanel();
                    else Swal.fire('Error', 'Akses ditolak!', 'error');
                    break;
            }
        }
        
        // ==================== LOGIN & REGISTER ====================
        function showLogin() {
            document.getElementById('welcomeText').innerHTML = '';
            document.getElementById('contentArea').innerHTML = `
                <div class="row justify-content-center">
                    <div class="col-md-5 col-11">
                        <div class="card">
                            <div class="card-header"><h4><i class="fas fa-sign-in-alt"></i> Login / Register</h4></div>
                            <div class="card-body">
                                <form id="loginForm">
                                    <div class="mb-3"><label>Username</label><input type="text" class="form-control" id="loginUsername" required></div>
                                    <div class="mb-3"><label>Password</label><input type="password" class="form-control" id="loginPassword" required></div>
                                    <button type="submit" class="btn btn-primary w-100 mb-2">Login</button>
                                    <button type="button" class="btn btn-secondary w-100" onclick="showRegister()">Register</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('loginForm').onsubmit = (e) => {
                e.preventDefault();
                const users = getUsers();
                const user = users.find(u => u.username === document.getElementById('loginUsername').value && u.password === document.getElementById('loginPassword').value);
                if (user) {
                    currentUser = user;
                    saveSession(user);
                    document.getElementById('welcomeText').innerHTML = `Selamat datang, ${user.profile.name || user.username}`;
                    updateNavVisibility();
                    Swal.fire({ title: 'Success!', text: 'Login berhasil!', icon: 'success', timer: 1500, showConfirmButton: false });
                    setTimeout(() => showProducts(), 1500);
                } else Swal.fire('Error', 'Username atau password salah!', 'error');
            };
        }
        
        function showRegister() {
            document.getElementById('contentArea').innerHTML = `
                <div class="row justify-content-center">
                    <div class="col-md-5 col-11">
                        <div class="card">
                            <div class="card-header"><h4><i class="fas fa-user-plus"></i> Register</h4></div>
                            <div class="card-body">
                                <form id="registerForm">
                                    <div class="mb-3"><label>Username *</label><input type="text" class="form-control" id="regUsername" required placeholder="Minimal 3 karakter"></div>
                                    <div class="mb-3"><label>Password *</label><input type="password" class="form-control" id="regPassword" required minlength="3"></div>
                                    <div class="mb-3"><label>Nama Lengkap *</label><input type="text" class="form-control" id="regName" required></div>
                                    <div class="mb-3"><label>No WhatsApp *</label><input type="text" class="form-control" id="regWhatsapp" required placeholder="Contoh: 08123456789"></div>
                                    <div class="mb-3"><label>Alamat *</label><textarea class="form-control" id="regAddress" rows="2" required></textarea></div>
                                    <button type="submit" class="btn btn-primary w-100 mb-2">Register</button>
                                    <button type="button" class="btn btn-secondary w-100" onclick="showLogin()">Kembali</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('registerForm').onsubmit = (e) => {
                e.preventDefault();
                const users = getUsers();
                const username = document.getElementById('regUsername').value.trim();
                if (username.length < 3) return Swal.fire('Error', 'Username minimal 3 karakter!', 'error');
                if (users.find(u => u.username === username)) return Swal.fire('Error', 'Username sudah terdaftar!', 'error');
                const password = document.getElementById('regPassword').value;
                if (password.length < 3) return Swal.fire('Error', 'Password minimal 3 karakter!', 'error');
                const name = document.getElementById('regName').value;
                const whatsapp = document.getElementById('regWhatsapp').value;
                const address = document.getElementById('regAddress').value;
                if (!name || !whatsapp || !address) return Swal.fire('Error', 'Semua field wajib diisi!', 'error');
                
                users.push({ 
                    username, password, role: 'user', 
                    profile: { name, lineId: '', whatsapp, address } 
                });
                setUsers(users);
                Swal.fire('Success', 'Registrasi berhasil! Silakan login.', 'success');
                showLogin();
            };
        }
        
        // ==================== PROFIL ====================
        function showProfile() {
            const profile = currentUser.profile;
            document.getElementById('contentArea').innerHTML = `
                <div class="card">
                    <div class="card-header"><h4><i class="fas fa-id-card"></i> Profil Saya</h4></div>
                    <div class="card-body">
                        <form id="profileForm">
                            <div class="mb-3"><label>Username</label><input type="text" class="form-control" value="${currentUser.username}" disabled></div>
                            <div class="mb-3"><label>Role</label><input type="text" class="form-control" value="${currentUser.role === 'admin' ? 'Administrator' : 'Pelanggan'}" disabled></div>
                            <div class="mb-3"><label>Nama Lengkap</label><input type="text" class="form-control" id="profileName" value="${profile.name || ''}" required></div>
                            <div class="mb-3"><label>ID Line (Opsional)</label><input type="text" class="form-control" id="profileLineId" value="${profile.lineId || ''}"></div>
                            <div class="mb-3"><label>No WhatsApp</label><input type="text" class="form-control" id="profileWhatsapp" value="${profile.whatsapp || ''}" required></div>
                            <div class="mb-3"><label>Alamat</label><textarea class="form-control" id="profileAddress" rows="2" required>${profile.address || ''}</textarea></div>
                            <button type="submit" class="btn btn-primary w-100 mb-2">Simpan Profil</button>
                            <button type="button" class="btn btn-warning w-100 mb-2" onclick="changePassword()">Ganti Password</button>
                            <button type="button" class="btn btn-danger w-100" onclick="logout()">Keluar</button>
                        </form>
                    </div>
                </div>
            `;
            document.getElementById('profileForm').onsubmit = (e) => {
                e.preventDefault();
                const users = getUsers();
                currentUser.profile = {
                    name: document.getElementById('profileName').value,
                    lineId: document.getElementById('profileLineId').value,
                    whatsapp: document.getElementById('profileWhatsapp').value,
                    address: document.getElementById('profileAddress').value
                };
                const idx = users.findIndex(u => u.username === currentUser.username);
                users[idx] = currentUser;
                setUsers(users);
                saveSession(currentUser);
                document.getElementById('welcomeText').innerHTML = `Selamat datang, ${currentUser.profile.name}`;
                Swal.fire('Success', 'Profil berhasil diupdate!', 'success');
            };
        }
        
        function changePassword() {
            Swal.fire({
                title: 'Ganti Password',
                html: `<input type="password" id="oldPass" class="swal2-input" placeholder="Password Lama"><input type="password" id="newPass" class="swal2-input" placeholder="Password Baru (min 3)"><input type="password" id="confirmPass" class="swal2-input" placeholder="Konfirmasi">`,
                showCancelButton: true, confirmButtonText: 'Ganti',
                preConfirm: () => {
                    if (document.getElementById('oldPass').value !== currentUser.password) return Swal.showValidationMessage('Password lama salah!');
                    if (document.getElementById('newPass').value !== document.getElementById('confirmPass').value) return Swal.showValidationMessage('Password baru tidak cocok!');
                    if (document.getElementById('newPass').value.length < 3) return Swal.showValidationMessage('Minimal 3 karakter!');
                    const users = getUsers();
                    currentUser.password = document.getElementById('newPass').value;
                    const idx = users.findIndex(u => u.username === currentUser.username);
                    users[idx] = currentUser;
                    setUsers(users);
                    saveSession(currentUser);
                    Swal.fire('Success', 'Password berhasil diganti!', 'success');
                }
            });
        }
        
        function logout() { 
            currentUser = null; 
            clearSession();
            document.getElementById('welcomeText').innerHTML = '';
            updateNavVisibility();
            Swal.fire('Logout', 'Anda telah keluar!', 'success'); 
            showLogin(); 
        }
        
        // ==================== PRODUK (SINKRON UNTUK SEMUA USER) ====================
        function showProducts() {
            const products = getProducts();
            let html = `<div class="products-grid">`;
            if (products.length === 0) {
                html += `<div class="empty-message"><i class="fas fa-box-open fa-3x mb-3"></i><p>Belum ada produk</p></div>`;
            } else {
                products.forEach(p => {
                    let sizeOptions = `<option value="" disabled selected>📦 Silahkan Pilih Ukuran</option>`;
                    p.sizes.forEach(s => {
                        sizeOptions += `<option value="${s.size}" data-price="${s.price}" data-stock="${s.stock}">${s.size} - ${s.price} ฿ (Stok: ${s.stock})</option>`;
                    });
                    html += `<div class="product-card">
                        <div class="product-image-container">
                            ${p.image ? `<img src="${p.image}" class="product-image">` : `<div class="product-image-placeholder"><i class="fas fa-perfume"></i></div>`}
                        </div>
                        <div class="product-name-badge"><i class="fas fa-tag"></i> ${p.name}</div>
                        <div class="size-select-wrapper">
                            <select class="size-select" id="size-${p.id}" onchange="updatePrice(${p.id})">${sizeOptions}</select>
                        </div>
                        <div class="info-row">
                            <div class="price-badge" id="price-${p.id}">${p.sizes[0]?.price || 0} ฿</div>
                            <div class="stock-info"><i class="fas fa-box"></i> Stok: ${p.sizes[0]?.stock || 0}</div>
                        </div>
                        <button class="btn-add-cart" onclick="addToCart(${p.id})"><i class="fas fa-shopping-cart"></i> TAMBAH KERANJANG</button>
                    </div>`;
                });
            }
            html += `</div>`;
            document.getElementById('contentArea').innerHTML = html;
        }
        
        function updatePrice(id) {
            const sel = document.getElementById(`size-${id}`);
            const opt = sel.options[sel.selectedIndex];
            if (opt.value) {
                document.getElementById(`price-${id}`).innerHTML = `${opt.getAttribute('data-price')} ฿`;
            }
        }
        
        function addToCart(id) {
            const sel = document.getElementById(`size-${id}`);
            const opt = sel.options[sel.selectedIndex];
            const size = opt.value;
            if (!size) return Swal.fire('Peringatan', 'Pilih ukuran terlebih dahulu!', 'warning');
            
            const price = parseInt(opt.getAttribute('data-price'));
            const stock = parseInt(opt.getAttribute('data-stock'));
            if (stock <= 0) return Swal.fire('Error', 'Stok habis!', 'error');
            
            const products = getProducts();
            const product = products.find(p => p.id === id);
            if (!product) return Swal.fire('Error', 'Produk tidak ditemukan!', 'error');
            
            let carts = getCarts();
            if (!carts[currentUser.username]) carts[currentUser.username] = [];
            const existing = carts[currentUser.username].find(i => i.productId === id && i.size === size);
            
            if (existing) {
                if (existing.quantity + 1 > stock) return Swal.fire('Error', `Stok hanya ${stock}!`, 'error');
                existing.quantity++;
            } else {
                carts[currentUser.username].push({ 
                    productId: id, 
                    productName: product.name, 
                    size, price, 
                    quantity: 1, 
                    maxStock: stock 
                });
            }
            setCarts(carts);
            Swal.fire({ title: 'Berhasil!', text: 'Ditambahkan ke keranjang!', icon: 'success', timer: 1200, showConfirmButton: false });
        }
        
        // ==================== KERANJANG ====================
        function showCart() {
            const carts = getCarts();
            const cart = carts[currentUser.username] || [];
            if (cart.length === 0) {
                document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-body text-center"><i class="fas fa-shopping-cart fa-3x text-muted mb-3"></i><h5>Keranjang Kosong</h5></div></div>`;
                return;
            }
            let total = 0;
            let html = `<div class="card"><div class="card-header"><h4><i class="fas fa-shopping-cart"></i> Keranjang Belanja</h4></div><div class="card-body"><div class="list-group">`;
            cart.forEach((item, i) => {
                const subtotal = item.price * item.quantity;
                total += subtotal;
                html += `<div class="list-group-item">
                    <div class="row align-items-center">
                        <div class="col-12 col-md-4"><strong>${item.productName}</strong> (${item.size})</div>
                        <div class="col-3 col-md-2">${item.price} ฿</div>
                        <div class="col-4 col-md-3"><input type="number" min="1" max="${item.maxStock}" value="${item.quantity}" onchange="updateQty(${i},this.value)" class="form-control form-control-sm"></div>
                        <div class="col-3 col-md-2">${subtotal} ฿</div>
                        <div class="col-2 col-md-1"><button class="btn btn-danger btn-sm" onclick="removeItem(${i})"><i class="fas fa-trash"></i></button></div>
                    </div>
                </div>`;
            });
            html += `</div><hr><div class="row"><div class="col-6"><h5>Total: ${total} ฿</h5></div><div class="col-6 text-end"><button class="btn btn-success w-100" onclick="checkout()">Checkout</button></div></div></div></div>`;
            document.getElementById('contentArea').innerHTML = html;
        }
        
        function updateQty(i, qty) {
            if (qty < 1) qty = 1;
            let carts = getCarts();
            const item = carts[currentUser.username][i];
            if (qty > item.maxStock) {
                Swal.fire('Error', `Maksimal ${item.maxStock}!`, 'error');
                qty = item.maxStock;
            }
            carts[currentUser.username][i].quantity = parseInt(qty);
            setCarts(carts);
            showCart();
        }
        
        function removeItem(i) {
            let carts = getCarts();
            carts[currentUser.username].splice(i, 1);
            setCarts(carts);
            showCart();
        }
        
        function checkout() {
            const profile = currentUser.profile;
            if (!profile.name || !profile.whatsapp || !profile.address) {
                Swal.fire('Error', 'Lengkapi profil dulu!', 'error');
                showProfile();
                return;
            }
            
            let carts = getCarts();
            let products = getProducts();
            const cart = carts[currentUser.username] || [];
            if (cart.length === 0) return Swal.fire('Error', 'Keranjang kosong!', 'error');
            
            let ok = true;
            cart.forEach(item => {
                const p = products.find(pr => pr.id === item.productId);
                if (p) {
                    const idx = p.sizes.findIndex(s => s.size === item.size);
                    if (idx !== -1 && p.sizes[idx].stock >= item.quantity) {
                        p.sizes[idx].stock -= item.quantity;
                    } else ok = false;
                } else ok = false;
            });
            if (!ok) return Swal.fire('Error', 'Stok tidak mencukupi!', 'error');
            
            setProducts(products);
            
            let orders = getOrders();
            if (!orders[currentUser.username]) orders[currentUser.username] = [];
            orders[currentUser.username].push({
                orderId: Date.now(),
                date: new Date().toISOString(),
                items: [...cart],
                total: cart.reduce((s, i) => s + (i.price * i.quantity), 0),
                status: 'pending',
                profile: { ...profile },
                username: currentUser.username
            });
            setOrders(orders);
            
            carts[currentUser.username] = [];
            setCarts(carts);
            Swal.fire('Success', 'Checkout berhasil!', 'success');
            showOrders();
        }
        
        // ==================== PESANAN ====================
        function showOrders() {
            const orders = getOrders();
            const userOrders = orders[currentUser.username] || [];
            if (userOrders.length === 0) {
                document.getElementById('contentArea').innerHTML = `<div class="card"><div class="card-body text-center"><i class="fas fa-clipboard-list fa-3x text-muted mb-3"></i><h5>Belum ada pesanan</h5></div></div>`;
                return;
            }
            let html = `<div class="card"><div class="card-header"><h4><i class="fas fa-history"></i> Riwayat Pesanan Saya</h4></div><div class="card-body">`;
            userOrders.slice().reverse().forEach(o => {
                const statusClass = o.status === 'pending' ? 'badge-pending' : o.status === 'processed' ? 'badge-processed' : 'badge-completed';
                const statusText = o.status === 'pending' ? 'Menunggu' : o.status === 'processed' ? 'Diproses' : 'Selesai';
                html += `<div class="card mb-2">
                    <div class="card-header" style="background:white;border-bottom:1px solid #ff6b6b;">
                        <strong>Order #${o.orderId}</strong>
                        <span class="badge-status ${statusClass} float-end">${statusText}</span>
                    </div>
                    <div class="card-body">
                        <p>${new Date(o.date).toLocaleString()}</p>
                        <p>Total: ${o.total} ฿</p>
                        <button class="btn btn-primary btn-sm" onclick="detailOrder(${o.orderId})">Detail</button>
                    </div>
                </div>`;
            });
            html += `</div></div>`;
            document.getElementById('contentArea').innerHTML = html;
        }
        
        function detailOrder(id) {
            const orders = getOrders();
            const order = orders[currentUser.username].find(o => o.orderId === id);
            if (!order) return;
            let html = `<div class="card">
                <div class="card-header"><h4>Detail Pesanan #${id}</h4><button class="btn btn-secondary btn-sm mt-2" onclick="showOrders()">Kembali</button></div>
                <div class="card-body">
                    <h6>Produk:</h6>
                    <div class="table-responsive"><table class="table table-sm"><thead><tr><th>Produk</th><th>Ukuran</th><th>Harga</th><th>Jumlah</th><th>Subtotal</th></tr></thead><tbody>`;
            order.items.forEach(i => {
                html += `<tr><td><strong>${i.productName}</strong></td><td>${i.size}</td><td>${i.price} ฿</td><td>${i.quantity}</td><td>${i.price * i.quantity} ฿</td></tr>`;
            });
            html += `</tbody><tfoot><tr><td colspan="4">Total:</td><th>${order.total} ฿</th></tr></tfoot></table></div>
                    <h6>Informasi Pengiriman:</h6>
                    <p>Nama: ${order.profile.name}</p>
                    <p>WhatsApp: ${order.profile.whatsapp}</p>
                    <p>Alamat: ${order.profile.address}</p>
                    <p>Status: ${order.status === 'pending' ? 'Menunggu' : order.status === 'processed' ? 'Diproses' : 'Selesai'}</p>
                </div>
            </div>`;
            document.getElementById('contentArea').innerHTML = html;
        }
        
        // ==================== KONTAK ====================
        function showContacts() {
            const contacts = getContacts();
            let html = `<div class="card"><div class="card-header"><h4><i class="fas fa-phone-alt"></i> Kontak Toko</h4></div><div class="card-body">
                <div class="text-center mb-3"><h6>Media Sosial</h6></div>
                <div class="social-container">`;
            const socials = [
                { name: 'WhatsApp', icon: 'fab fa-whatsapp', color: 'whatsapp', key: 'whatsapp' },
                { name: 'Line', icon: 'fab fa-line', color: 'line', key: 'line' },
                { name: 'Telegram', icon: 'fab fa-telegram', color: 'telegram', key: 'telegram' },
                { name: 'Instagram', icon: 'fab fa-instagram', color: 'instagram', key: 'instagram' },
                { name: 'Facebook', icon: 'fab fa-facebook', color: 'facebook', key: 'facebook' },
                { name: 'TikTok', icon: 'fab fa-tiktok', color: 'tiktok', key: 'tiktok' }
            ];
            let has = false;
            socials.forEach(s => {
                if (contacts.social[s.key] && contacts.social[s.key].trim()) {
                    has = true;
                    html += `<div class="social-card" onclick="window.open('${contacts.social[s.key]}','_blank')"><div class="social-icon-wrapper ${s.color}"><i class="${s.icon}"></i></div><div class="social-name">${s.name}</div></div>`;
                }
            });
            if (!has) html += `<div class="empty-message">Belum ada media sosial</div>`;
            html += `</div><div class="text-center mt-3"><h6>Rekening Bank</h6></div><div class="row">`;
            if (contacts.banks.length) {
                contacts.banks.forEach(b => {
                    html += `<div class="col-12"><div class="bank-card" onclick="copyBank('${b.number}')"><div class="d-flex justify-content-between align-items-center"><div><i class="fas fa-credit-card"></i> <strong>${b.bankName}</strong><br>${b.name}<br><small>${b.number}</small></div><i class="fas fa-copy"></i></div></div></div>`;
                });
            } else html += `<div class="empty-message">Belum ada rekening bank</div>`;
            html += `</div></div></div>`;
            document.getElementById('contentArea').innerHTML = html;
        }
        
        function copyBank(text) {
            navigator.clipboard.writeText(text);
            Swal.fire({ title: 'Berhasil!', text: 'Nomor rekening disalin', icon: 'success', timer: 1500, showConfirmButton: false });
        }
        
        // ==================== ADMIN PANEL ====================
        function showAdminPanel() {
            if (currentUser.role !== 'admin') return;
            document.getElementById('contentArea').innerHTML = `
                <div class="card">
                    <div class="card-header"><h4><i class="fas fa-cog"></i> Panel Admin</h4></div>
                    <div class="card-body">
                        <ul class="nav nav-tabs" id="adminTab">
                            <li class="nav-item"><button class="nav-link active" data-bs-target="products">Kelola Produk</button></li>
                            <li class="nav-item"><button class="nav-link" data-bs-target="orders">Kelola Pesanan</button></li>
                            <li class="nav-item"><button class="nav-link" data-bs-target="contacts">Kelola Kontak</button></li>
                            <li class="nav-item"><button class="nav-link" data-bs-target="users">Kelola Pengguna</button></li>
                        </ul>
                        <div id="adminContent"></div>
                    </div>
                </div>
            `;
            
            document.querySelectorAll('#adminTab button').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('#adminTab button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const target = btn.getAttribute('data-bs-target');
                    if (target === 'products') loadAdminProducts();
                    else if (target === 'orders') loadAdminOrders();
                    else if (target === 'contacts') loadAdminContacts();
                    else if (target === 'users') loadAdminUsers();
                };
            });
            loadAdminProducts();
        }
        
        function loadAdminProducts() {
            const products = getProducts();
            let html = `<button class="btn btn-success mb-3 w-100" onclick="openAddProductModal()"><i class="fas fa-plus"></i> Tambah Produk Baru</button>
                <div class="table-responsive"><table class="table table-bordered"><thead><tr><th>ID</th><th>Gambar</th><th>Nama Produk</th><th>Ukuran & Harga</th><th>Aksi</th></tr></thead><tbody>`;
            if (products.length === 0) html += `<tr><td colspan="5" class="text-center">Belum ada produk</td></tr>`;
            else {
                products.forEach(p => {
                    let sizesHtml = '';
                    p.sizes.forEach(s => { sizesHtml += `<span class="badge bg-secondary me-1">${s.size}: ${s.price}฿ (Stok:${s.stock})</span><br>`; });
                    html += `<tr>
                        <td>${p.id}</td>
                        <td>${p.image ? `<img src="${p.image}" class="product-image-thumb">` : '<i class="fas fa-perfume fa-2x"></i>'}</td>
                        <td><strong>${p.name}</strong></td>
                        <td>${sizesHtml}</td>
                        <td><button class="btn btn-sm btn-warning me-1" onclick="openEditProductModal(${p.id})"><i class="fas fa-edit"></i> Edit</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteProductAdmin(${p.id})"><i class="fas fa-trash"></i> Hapus</button></td>
                    </tr>`;
                });
            }
            html += `</tbody></table></div>`;
            document.getElementById('adminContent').innerHTML = html;
        }
        
        function openAddProductModal() {
            let currentImage = null;
            Swal.fire({
                title: 'Tambah Produk Baru',
                html: `<div style="max-height:60vh; overflow-y:auto;">
                    <div class="form-group"><label>Nama Produk *</label><input type="text" id="prodName" class="form-control"></div>
                    <div class="form-group"><label>Gambar</label><input type="file" id="prodImage" accept="image/*"><div id="imgPreview"></div></div>
                    <div class="fw-bold mb-2">Ukuran</div>
                    <div id="sizeContainer"></div>
                    <button type="button" class="btn-add-size" onclick="addSizeRow('sizeContainer')">+ Tambah Ukuran</button>
                </div>`,
                width: '95%', showCancelButton: true, confirmButtonText: 'Simpan',
                didOpen: () => {
                    const container = document.getElementById('sizeContainer');
                    if (container) {
                        ['30ml', '35ml', '50ml', '100ml'].forEach(s => {
                            const div = document.createElement('div');
                            div.className = 'size-row';
                            div.innerHTML = `<input type="text" class="size-name-input" value="${s}" placeholder="Ukuran"><input type="number" class="size-price-input" placeholder="Harga"><input type="number" class="size-stock-input" placeholder="Stok"><button type="button" class="btn-remove-size" onclick="this.parentElement.remove()">Hapus</button>`;
                            container.appendChild(div);
                        });
                    }
                    const fileInput = document.getElementById('prodImage');
                    if (fileInput) {
                        fileInput.onchange = (e) => {
                            const file = e.target.files[0];
                            if (file) {
                                const reader = new FileReader();
                                reader.onload = (ev) => {
                                    currentImage = ev.target.result;
                                    document.getElementById('imgPreview').innerHTML = `<img src="${currentImage}" class="image-preview">`;
                                };
                                reader.readAsDataURL(file);
                            }
                        };
                    }
                },
                preConfirm: () => {
                    const name = document.getElementById('prodName')?.value.trim();
                    if (!name) return Swal.showValidationMessage('Nama produk wajib diisi!');
                    const sizes = [];
                    document.querySelectorAll('#sizeContainer .size-row').forEach(row => {
                        const size = row.querySelector('.size-name-input')?.value.trim();
                        const price = row.querySelector('.size-price-input')?.value;
                        const stock = row.querySelector('.size-stock-input')?.value;
                        if (size && price && stock) sizes.push({ size, price: parseInt(price), stock: parseInt(stock) });
                    });
                    if (sizes.length === 0) return Swal.showValidationMessage('Minimal 1 ukuran!');
                    const products = getProducts();
                    const newId = products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 1;
                    products.push({ id: newId, name, image: currentImage, sizes });
                    setProducts(products);
                    if (currentMenu === 'produk') showProducts();
                    loadAdminProducts();
                    Swal.fire('Success', 'Produk ditambahkan!', 'success');
                }
            });
        }
        
        function openEditProductModal(id) {
            const products = getProducts();
            const product = products.find(p => p.id === id);
            if (!product) return;
            let currentImage = product.image;
            let sizesHtml = '';
            product.sizes.forEach(s => {
                sizesHtml += `<div class="size-row"><input type="text" class="size-name-input" value="${s.size}"><input type="number" class="size-price-input" value="${s.price}"><input type="number" class="size-stock-input" value="${s.stock}"><button type="button" class="btn-remove-size" onclick="this.parentElement.remove()">Hapus</button></div>`;
            });
            Swal.fire({
                title: 'Edit Produk',
                html: `<div style="max-height:60vh; overflow-y:auto;">
                    <div class="form-group"><label>Nama Produk</label><input type="text" id="editName" class="form-control" value="${product.name.replace(/"/g, '&quot;')}"></div>
                    <div class="form-group"><div id="editImgPreview">${product.image ? `<img src="${product.image}" class="image-preview">` : ''}</div><input type="file" id="editImage" accept="image/*"><label class="file-input-label mt-2" onclick="document.getElementById('editImage').click()">Ganti Gambar</label></div>
                    <div class="fw-bold mb-2">Ukuran</div>
                    <div id="editSizeContainer">${sizesHtml}</div>
                    <button type="button" class="btn-add-size" onclick="addSizeRow('editSizeContainer')">+ Tambah Ukuran</button>
                </div>`,
                width: '95%', showCancelButton: true, confirmButtonText: 'Simpan',
                didOpen: () => {
                    const fileInput = document.getElementById('editImage');
                    if (fileInput) {
                        fileInput.onchange = (e) => {
                            const file = e.target.files[0];
                            if (file) {
                                const reader = new FileReader();
                                reader.onload = (ev) => {
                                    currentImage = ev.target.result;
                                    document.getElementById('editImgPreview').innerHTML = `<img src="${currentImage}" class="image-preview">`;
                                };
                                reader.readAsDataURL(file);
                            }
                        };
                    }
                },
                preConfirm: () => {
                    const name = document.getElementById('editName')?.value.trim();
                    if (!name) return Swal.showValidationMessage('Nama produk wajib diisi!');
                    const sizes = [];
                    document.querySelectorAll('#editSizeContainer .size-row').forEach(row => {
                        const size = row.querySelector('.size-name-input')?.value.trim();
                        const price = row.querySelector('.size-price-input')?.value;
                        const stock = row.querySelector('.size-stock-input')?.value;
                        if (size && price && stock) sizes.push({ size, price: parseInt(price), stock: parseInt(stock) });
                    });
                    if (sizes.length === 0) return Swal.showValidationMessage('Minimal 1 ukuran!');
                    const products = getProducts();
                    const idx = products.findIndex(p => p.id === id);
                    products[idx] = { ...products[idx], name, image: currentImage, sizes };
                    setProducts(products);
                    if (currentMenu === 'produk') showProducts();
                    loadAdminProducts();
                    Swal.fire('Success', 'Produk diupdate!', 'success');
                }
            });
        }
        
        function addSizeRow(containerId) {
            const container = document.getElementById(containerId);
            if (container) {
                const div = document.createElement('div');
                div.className = 'size-row';
                div.innerHTML = `<input type="text" class="size-name-input" placeholder="Ukuran"><input type="number" class="size-price-input" placeholder="Harga"><input type="number" class="size-stock-input" placeholder="Stok"><button type="button" class="btn-remove-size" onclick="this.parentElement.remove()">Hapus</button>`;
                container.appendChild(div);
            }
        }
        
        function deleteProductAdmin(id) {
            Swal.fire({ title: 'Hapus Produk?', icon: 'warning', showCancelButton: true, confirmButtonText: 'Hapus' }).then(result => {
                if (result.isConfirmed) {
                    const products = getProducts();
                    const index = products.findIndex(p => p.id === id);
                    if (index !== -1) {
                        products.splice(index, 1);
                        setProducts(products);
                        if (currentMenu === 'produk') showProducts();
                        loadAdminProducts();
                        Swal.fire('Terhapus!', 'Produk dihapus.', 'success');
                    }
                }
            });
        }
        
        function loadAdminOrders() {
            const orders = getOrders();
            let allOrders = [];
            for (let username in orders) {
                if (orders[username] && Array.isArray(orders[username])) {
                    orders[username].forEach(order => {
                        allOrders.push({ ...order, customerName: username });
                    });
                }
            }
            allOrders.sort((a, b) => b.orderId - a.orderId);
            if (allOrders.length === 0) {
                document.getElementById('adminContent').innerHTML = '<div class="empty-message">Belum ada pesanan</div>';
                return;
            }
            let html = `<div class="table-responsive"><table class="table table-bordered"><thead><tr><th>Order ID</th><th>Customer</th><th>Tanggal</th><th>Total</th><th>Status</th><th>Aksi</th></tr></thead><tbody>`;
            allOrders.forEach(order => {
                const statusColor = order.status === 'pending' ? 'warning' : order.status === 'processed' ? 'info' : 'success';
                const statusText = order.status === 'pending' ? 'Menunggu' : order.status === 'processed' ? 'Diproses' : 'Selesai';
                html += `<tr>
                    <td>#${order.orderId}</td>
                    <td>${order.profile.name || order.customerName}</td>
                    <td>${new Date(order.date).toLocaleDateString()}</td>
                    <td>${order.total} ฿</td>
                    <td><span class="badge bg-${statusColor}">${statusText}</span></td>
                    <td>
                        <button class="btn btn-sm btn-primary me-1" onclick="viewOrderDetail('${order.orderId}', '${order.customerName}')"><i class="fas fa-eye"></i></button>
                        <select class="form-select form-select-sm d-inline-block w-auto me-1" onchange="updateOrderStatus('${order.orderId}', '${order.customerName}', this.value)">
                            <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>Menunggu</option>
                            <option value="processed" ${order.status === 'processed' ? 'selected' : ''}>Diproses</option>
                            <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>Selesai</option>
                        </select>
                        <button class="btn btn-sm btn-danger" onclick="deleteOrder('${order.orderId}', '${order.customerName}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            });
            html += `</tbody></table></div>`;
            document.getElementById('adminContent').innerHTML = html;
        }
        
        function viewOrderDetail(orderId, username) {
            const orders = getOrders();
            const order = orders[username]?.find(o => o.orderId == orderId);
            if (!order) return;
            let html = `<div><button class="btn btn-secondary btn-sm mb-3" onclick="loadAdminOrders()">← Kembali</button>
                <div class="card"><div class="card-header"><h5>Detail Pesanan #${orderId}</h5></div>
                <div class="card-body"><h6>Produk:</h6><table class="table table-sm"><thead><tr><th>Produk</th><th>Ukuran</th><th>Harga</th><th>Jumlah</th><th>Subtotal</th></tr></thead><tbody>`;
            order.items.forEach(i => {
                html += `<tr><td>${i.productName}</td><td>${i.size}</td><td>${i.price} ฿</td><td>${i.quantity}</td><td>${i.price * i.quantity} ฿</td></tr>`;
            });
            html += `</tbody><tfoot><tr><td colspan="4">Total:</td><th>${order.total} ฿</th></tr></tfoot></table>
                <h6>Informasi Pengiriman:</h6>
                <p>Nama: ${order.profile.name}</p>
                <p>WhatsApp: ${order.profile.whatsapp}</p>
                <p>Alamat: ${order.profile.address}</p>
                <p>Status: ${order.status === 'pending' ? 'Menunggu' : order.status === 'processed' ? 'Diproses' : 'Selesai'}</p>
                </div></div></div>`;
            document.getElementById('adminContent').innerHTML = html;
        }
        
        function updateOrderStatus(orderId, username, newStatus) {
            const orders = getOrders();
            const orderIndex = orders[username]?.findIndex(o => o.orderId == orderId);
            if (orderIndex !== undefined && orderIndex !== -1) {
                orders[username][orderIndex].status = newStatus;
                setOrders(orders);
                Swal.fire('Success', 'Status pesanan diupdate!', 'success');
                loadAdminOrders();
            }
        }
        
        function deleteOrder(orderId, username) {
            Swal.fire({ title: 'Hapus Pesanan?', icon: 'warning', showCancelButton: true, confirmButtonText: 'Hapus' }).then(result => {
                if (result.isConfirmed) {
                    const orders = getOrders();
                    const orderIndex = orders[username]?.findIndex(o => o.orderId == orderId);
                    if (orderIndex !== undefined && orderIndex !== -1) {
                        orders[username].splice(orderIndex, 1);
                        if (orders[username].length === 0) delete orders[username];
                        setOrders(orders);
                        loadAdminOrders();
                        Swal.fire('Terhapus!', 'Pesanan dihapus.', 'success');
                    }
                }
            });
        }
        
        function loadAdminContacts() {
            const contacts = getContacts();
            let html = `<div class="card mb-3"><div class="card-header"><h5>Media Sosial</h5></div>
                <div class="card-body"><form id="socialForm">
                    <div class="row">
                        <div class="col-md-6 mb-2"><label>WhatsApp URL</label><input type="text" class="form-control" id="socWhatsapp" value="${contacts.social.whatsapp || ''}"></div>
                        <div class="col-md-6 mb-2"><label>Line URL</label><input type="text" class="form-control" id="socLine" value="${contacts.social.line || ''}"></div>
                        <div class="col-md-6 mb-2"><label>Telegram URL</label><input type="text" class="form-control" id="socTelegram" value="${contacts.social.telegram || ''}"></div>
                        <div class="col-md-6 mb-2"><label>Instagram URL</label><input type="text" class="form-control" id="socInstagram" value="${contacts.social.instagram || ''}"></div>
                        <div class="col-md-6 mb-2"><label>Facebook URL</label><input type="text" class="form-control" id="socFacebook" value="${contacts.social.facebook || ''}"></div>
                        <div class="col-md-6 mb-2"><label>TikTok URL</label><input type="text" class="form-control" id="socTiktok" value="${contacts.social.tiktok || ''}"></div>
                    </div>
                    <button type="submit" class="btn btn-primary mt-2">Simpan Media Sosial</button>
                </form></div></div>
                <div class="card"><div class="card-header"><h5>Rekening Bank</h5></div><div class="card-body">
                <button class="btn btn-success mb-3" onclick="addBank()"><i class="fas fa-plus"></i> Tambah Rekening</button>
                <div id="bankList"></div></div></div>`;
            document.getElementById('adminContent').innerHTML = html;
            
            document.getElementById('socialForm').onsubmit = (e) => {
                e.preventDefault();
                const contacts = getContacts();
                contacts.social = {
                    whatsapp: document.getElementById('socWhatsapp').value,
                    line: document.getElementById('socLine').value,
                    telegram: document.getElementById('socTelegram').value,
                    instagram: document.getElementById('socInstagram').value,
                    facebook: document.getElementById('socFacebook').value,
                    tiktok: document.getElementById('socTiktok').value
                };
                setContacts(contacts);
                if (currentMenu === 'kontak') showContacts();
                Swal.fire('Success', 'Media sosial disimpan!', 'success');
                loadAdminContacts();
            };
            displayBanks();
        }
        
        function displayBanks() {
            const contacts = getContacts();
            let html = `<div class="table-responsive"><table class="table table-sm"><thead><tr><th>Bank</th><th>Atas Nama</th><th>No. Rekening</th><th>Aksi</th></tr></thead><tbody>`;
            contacts.banks.forEach((bank, idx) => {
                html += `<tr>
                    <td>${bank.bankName}</td>
                    <td>${bank.name}</td>
                    <td>${bank.number}</td>
                    <td><i class="fas fa-edit text-warning me-2" style="cursor:pointer" onclick="editBank(${idx})"></i><i class="fas fa-trash text-danger" style="cursor:pointer" onclick="deleteBank(${idx})"></i></td>
                </tr>`;
            });
            html += `</tbody></table></div>`;
            if (contacts.banks.length === 0) html = '<div class="empty-message">Belum ada rekening bank</div>';
            document.getElementById('bankList').innerHTML = html;
        }
        
        function addBank() {
            Swal.fire({
                title: 'Tambah Rekening Bank',
                html: `<input type="text" id="bankName" class="swal2-input" placeholder="Nama Bank"><input type="text" id="accName" class="swal2-input" placeholder="Atas Nama"><input type="text" id="accNumber" class="swal2-input" placeholder="Nomor Rekening">`,
                showCancelButton: true, confirmButtonText: 'Tambah',
                preConfirm: () => {
                    const bankName = document.getElementById('bankName').value;
                    const accName = document.getElementById('accName').value;
                    const accNumber = document.getElementById('accNumber').value;
                    if (!bankName || !accName || !accNumber) return Swal.showValidationMessage('Semua field harus diisi!');
                    const contacts = getContacts();
                    contacts.banks.push({ bankName, name: accName, number: accNumber });
                    setContacts(contacts);
                    if (currentMenu === 'kontak') showContacts();
                    displayBanks();
                    Swal.fire('Success', 'Rekening ditambahkan!', 'success');
                }
            });
        }
        
        function editBank(index) {
            const contacts = getContacts();
            const bank = contacts.banks[index];
            Swal.fire({
                title: 'Edit Rekening Bank',
                html: `<input type="text" id="bankName" class="swal2-input" value="${bank.bankName}"><input type="text" id="accName" class="swal2-input" value="${bank.name}"><input type="text" id="accNumber" class="swal2-input" value="${bank.number}">`,
                showCancelButton: true, confirmButtonText: 'Simpan',
                preConfirm: () => {
                    contacts.banks[index] = {
                        bankName: document.getElementById('bankName').value,
                        name: document.getElementById('accName').value,
                        number: document.getElementById('accNumber').value
                    };
                    setContacts(contacts);
                    if (currentMenu === 'kontak') showContacts();
                    displayBanks();
                    Swal.fire('Success', 'Rekening diupdate!', 'success');
                }
            });
        }
        
        function deleteBank(index) {
            Swal.fire({ title: 'Hapus Rekening?', icon: 'warning', showCancelButton: true, confirmButtonText: 'Hapus' }).then(result => {
                if (result.isConfirmed) {
                    const contacts = getContacts();
                    contacts.banks.splice(index, 1);
                    setContacts(contacts);
                    if (currentMenu === 'kontak') showContacts();
                    displayBanks();
                    Swal.fire('Terhapus!', 'Rekening dihapus.', 'success');
                }
            });
        }
        
        function loadAdminUsers() {
            const users = getUsers();
            let html = `<div class="table-responsive"><table class="table table-bordered"><thead><tr><th>Username</th><th>Nama</th><th>WhatsApp</th><th>Alamat</th><th>Role</th><th>Aksi</th></tr></thead><tbody>`;
            users.forEach(user => {
                const roleBadge = user.role === 'admin' ? '<span class="badge bg-danger">Admin</span>' : '<span class="badge bg-success">Pelanggan</span>';
                html += `<tr>
                    <td><strong>${user.username}</strong></td>
                    <td>${user.profile.name || '-'}</td>
                    <td>${user.profile.whatsapp || '-'}</td>
                    <td>${user.profile.address ? user.profile.address.substring(0, 30) : '-'}</td>
                    <td>${roleBadge}</td>
                    <td class="action-buttons">
                        <button class="btn btn-sm btn-info" onclick="editUser('${user.username}')"><i class="fas fa-edit"></i> Edit</button>
                        <button class="btn btn-sm btn-warning" onclick="changeUserPass('${user.username}')"><i class="fas fa-key"></i> Ganti Pass</button>
                        ${user.username !== 'admin' ? `<button class="btn btn-sm btn-danger" onclick="deleteUser('${user.username}')"><i class="fas fa-trash"></i> Hapus</button>` : '<span>-</span>'}
                    </td>
                </tr>`;
            });
            html += `</tbody></table></div>`;
            document.getElementById('adminContent').innerHTML = html;
        }
        
        function editUser(username) {
            const users = getUsers();
            const user = users.find(u => u.username === username);
            if (!user) return;
            Swal.fire({
                title: `Edit Profil: ${username}`,
                html: `<div><div class="form-group"><label>Nama</label><input type="text" id="editName" class="form-control" value="${user.profile.name || ''}"></div>
                    <div class="form-group"><label>ID Line</label><input type="text" id="editLineId" class="form-control" value="${user.profile.lineId || ''}"></div>
                    <div class="form-group"><label>WhatsApp</label><input type="text" id="editWhatsapp" class="form-control" value="${user.profile.whatsapp || ''}"></div>
                    <div class="form-group"><label>Alamat</label><textarea id="editAddress" class="form-control" rows="2">${user.profile.address || ''}</textarea></div>
                    <div class="form-group"><label>Role</label><select id="editRole" class="form-control"><option value="user" ${user.role === 'user' ? 'selected' : ''}>Pelanggan</option><option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option></select></div></div>`,
                width: '500px', showCancelButton: true, confirmButtonText: 'Simpan',
                preConfirm: () => {
                    user.profile.name = document.getElementById('editName').value;
                    user.profile.lineId = document.getElementById('editLineId').value;
                    user.profile.whatsapp = document.getElementById('editWhatsapp').value;
                    user.profile.address = document.getElementById('editAddress').value;
                    user.role = document.getElementById('editRole').value;
                    const users = getUsers();
                    const idx = users.findIndex(u => u.username === username);
                    users[idx] = user;
                    setUsers(users);
                    if (currentUser.username === username) {
                        currentUser = user;
                        saveSession(currentUser);
                        document.getElementById('welcomeText').innerHTML = `Selamat datang, ${currentUser.profile.name}`;
                        updateNavVisibility();
                    }
                    Swal.fire('Success', 'Profil diupdate!', 'success');
                    loadAdminUsers();
                }
            });
        }
        
        function changeUserPass(username) {
            Swal.fire({
                title: `Ganti Password: ${username}`,
                html: `<input type="password" id="newPass" class="swal2-input" placeholder="Password Baru (min 3)"><input type="password" id="confirmPass" class="swal2-input" placeholder="Konfirmasi">`,
                showCancelButton: true, confirmButtonText: 'Ganti',
                preConfirm: () => {
                    const newPass = document.getElementById('newPass').value;
                    const confirmPass = document.getElementById('confirmPass').value;
                    if (!newPass) return Swal.showValidationMessage('Password baru tidak boleh kosong!');
                    if (newPass.length < 3) return Swal.showValidationMessage('Minimal 3 karakter!');
                    if (newPass !== confirmPass) return Swal.showValidationMessage('Password tidak cocok!');
                    const users = getUsers();
                    const user = users.find(u => u.username === username);
                    if (user) {
                        user.password = newPass;
                        setUsers(users);
                        if (currentUser.username === username) {
                            currentUser = user;
                            saveSession(currentUser);
                        }
                        Swal.fire('Success', 'Password diganti!', 'success');
                    }
                }
            });
        }
        
        function deleteUser(username) {
            if (username === 'admin') return Swal.fire('Error', 'Tidak bisa hapus admin!', 'error');
            Swal.fire({ title: 'Hapus Pengguna?', icon: 'warning', showCancelButton: true, confirmButtonText: 'Hapus' }).then(result => {
                if (result.isConfirmed) {
                    const users = getUsers();
                    const index = users.findIndex(u => u.username === username);
                    if (index !== -1) {
                        users.splice(index, 1);
                        setUsers(users);
                        let carts = getCarts();
                        let orders = getOrders();
                        delete carts[username];
                        delete orders[username];
                        setCarts(carts);
                        setOrders(orders);
                        loadAdminUsers();
                        Swal.fire('Terhapus!', 'Pengguna dihapus.', 'success');
                    }
                }
            });
        }
        
        // Register global functions
        window.showContent = showContent;
        window.showRegister = showRegister;
        window.showLogin = showLogin;
        window.logout = logout;
        window.changePassword = changePassword;
        window.updatePrice = updatePrice;
        window.addToCart = addToCart;
        window.updateQty = updateQty;
        window.removeItem = removeItem;
        window.checkout = checkout;
        window.detailOrder = detailOrder;
        window.copyBank = copyBank;
        window.openAddProductModal = openAddProductModal;
        window.openEditProductModal = openEditProductModal;
        window.deleteProductAdmin = deleteProductAdmin;
        window.addSizeRow = addSizeRow;
        window.loadAdminOrders = loadAdminOrders;
        window.loadAdminProducts = loadAdminProducts;
        window.loadAdminContacts = loadAdminContacts;
        window.loadAdminUsers = loadAdminUsers;
        window.viewOrderDetail = viewOrderDetail;
        window.updateOrderStatus = updateOrderStatus;
        window.deleteOrder = deleteOrder;
        window.addBank = addBank;
        window.editBank = editBank;
        window.deleteBank = deleteBank;
        window.editUser = editUser;
        window.changeUserPass = changeUserPass;
        window.deleteUser = deleteUser;
        
        // Start app
        initData();
        const sessionUser = loadSession();
        if (sessionUser) {
            currentUser = sessionUser;
            document.getElementById('welcomeText').innerHTML = `Selamat datang, ${currentUser.profile.name || currentUser.username}`;
            updateNavVisibility();
            showProducts();
            const produkNav = document.querySelector('.nav-item-bottom[onclick*="produk"]');
            if (produkNav) produkNav.classList.add('active');
        } else {
            showLogin();
        }
        
        // Auto refresh untuk sinkronisasi data antar user
        setInterval(() => {
            if (currentUser && currentMenu === 'produk') {
                showProducts();
            }
            if (currentUser && currentMenu === 'kontak') {
                showContacts();
            }
        }, 3000);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
